<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Vecinal — Pinto</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde: #2d6a4f; --verde-claro: #52b788; --crema: #fefae0;
    --arena: #e9edc9; --texto: #1b2a1e; --texto-suave: #5a6e5d;
    --bot-bg: #d8f3dc; --user-bg: #2d6a4f;
  }
  body { background: var(--crema); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
  .container { width: 100%; max-width: 580px; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .tag { display: inline-block; background: var(--verde); color: #fff; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 10px; }
  h1 { font-family: 'Fraunces', serif; font-size: 28px; color: var(--texto); font-weight: 600; line-height: 1.2; }
  h1 em { color: var(--verde); font-style: italic; }
  .subtitle { margin-top: 6px; font-size: 13px; color: var(--texto-suave); }
  .card { background: #fff; border-radius: 20px; border: 1px solid var(--arena); overflow: hidden; }
  .chat-box { min-height: 340px; max-height: 440px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 1.25rem; }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--arena); border-radius: 4px; }
  .bubble-wrap { display: flex; animation: fadeUp 0.2s ease; }
  .bubble-wrap.bot { justify-content: flex-start; }
  .bubble-wrap.user { justify-content: flex-end; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .bubble { max-width: 80%; padding: 10px 15px; font-size: 14px; line-height: 1.55; border-radius: 18px; }
  .bubble.bot { background: var(--bot-bg); color: var(--texto); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.typing { background: #f0f0f0; color: #999; font-style: italic; font-size: 13px; }
  .input-area { padding: 1rem 1.25rem; border-top: 1px solid var(--arena); display: flex; gap: 10px; align-items: flex-end; background: #fafaf8; }
  textarea { flex: 1; resize: none; font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 10px 14px; border-radius: 12px; border: 1px solid #ddd; background: #fff; color: var(--texto); outline: none; }
  textarea:focus { border-color: var(--verde-claro); }
  textarea::placeholder { color: #bbb; }
  .btn-send { padding: 10px 20px; border-radius: 12px; background: var(--verde); border: none; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .btn-send:hover { background: #245a41; }
  .btn-send:disabled { background: #a8c5b5; cursor: not-allowed; }
  .actions { padding: 0.75rem 1.25rem 1rem; display: flex; gap: 8px; flex-wrap: wrap; background: #fafaf8; border-top: 1px solid var(--arena); }
  .btn-sec { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: var(--texto-suave); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .btn-sec:hover { background: var(--arena); }
  .contador { font-size: 11px; color: var(--texto-suave); padding: 6px 1.25rem; background: #fafaf8; border-top: 1px solid var(--arena); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="tag">Pinto · Santiago del Estero</span>
    <h1>Tu voz <em>importa</em></h1>
    <p class="subtitle">Contanos que necesita el pueblo. Tus respuestas son anonimas.</p>
  </div>
  <div class="card">
    <div class="chat-box" id="chat-box"></div>
    <div class="contador" id="contador">0 vecinos participaron hoy</div>
    <div class="input-area">
      <textarea id="user-input" rows="2" placeholder="Contanos que necesita Pinto o tu zona rural..."></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
    <div class="actions">
      <button class="btn-sec" onclick="showSummary()">Ver resumen de respuestas ↗</button>
      <button class="btn-sec" onclick="resetChat()">Nueva conversacion</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbx6Ed1Xzxf-m9TY2OuydHlZfL2lKEFHbBvk9ON3hZf3ZRgICe0BYmB-Kcw1taKI-t0n/exec";

const allResponses = [];
let conversationHistory = [];
let turnCount = 0;
let sessionId = Date.now().toString(36);
let vecinos = parseInt(localStorage.getItem("vecinos") || "0");

document.getElementById("contador").textContent = `${vecinos} vecinos participaron hoy`;

const systemPrompt = `Sos un asistente amable que trabaja para una campaña política en Pinto, una localidad de Santiago del Estero, Argentina, con mucha zona rural. Tu rol es escuchar a los vecinos y entender sus problemas, necesidades y prioridades.

Temas clave de la zona: caminos rurales, agua potable y de riego, produccion agricola y ganadera, salud, educacion rural, trabajo, conectividad, vivienda.

Reglas estrictas:
- Saludá de forma cálida y breve al inicio
- Preguntá primero si es del pueblo o de zona rural
- Hacé UNA sola pregunta por vez, NUNCA más de una
- Profundizá: zona especifica, hace cuánto, que solución proponen
- Si alguien escribe cosas sin sentido o insultos, respondé amablemente que solo podés hablar de temas del pueblo
- Maximo 10 mensajes por conversacion, despues agradecé y cerrá
- Despues de 4-5 intercambios agradecé y preguntá si hay algo más
- Hablá en argentino informal y cálido, sin ser formal
- Sé conciso, no más de 3 oraciones por respuesta
- No hagas promesas políticas, solo escuchá y entendé`;

async function guardarEnSheets(rol, mensaje) {
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, fecha: new Date().toLocaleString("es-AR"), rol, mensaje })
    });
  } catch(e) { console.warn("No se pudo guardar:", e); }
}

async function callAI(messages) {
  // Llama a la Netlify Function (no expone la API key)
  const res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 300,
      system: systemPrompt,
      messages
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "Hubo un error, intentá de nuevo.";
}

function addBubble(text, role) {
  const box = document.getElementById("chat-box");
  const wrap = document.createElement("div");
  wrap.className = `bubble-wrap ${role === "assistant" ? "bot" : "user"}`;
  const bubble = document.createElement("div");
  bubble.className = `bubble ${role === "assistant" ? "bot" : "user"}`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById("chat-box");
  const wrap = document.createElement("div");
  wrap.id = "typing";
  wrap.className = "bubble-wrap bot";
  const bubble = document.createElement("div");
  bubble.className = "bubble typing";
  bubble.textContent = "escribiendo...";
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
  if (turnCount >= 10) {
    addBubble("Esta conversacion llego al limite. Apreta 'Nueva conversacion' para empezar de nuevo.", "assistant");
    return;
  }
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addBubble(text, "user");
  allResponses.push(text);
  conversationHistory.push({ role: "user", content: text });
  guardarEnSheets("vecino", text);
  turnCount++;
  addTyping();
  document.getElementById("send-btn").disabled = true;
  try {
    const reply = await callAI(conversationHistory);
    document.getElementById("typing")?.remove();
    addBubble(reply, "assistant");
    conversationHistory.push({ role: "assistant", content: reply });
    guardarEnSheets("bot", reply);
  } catch(e) {
    document.getElementById("typing")?.remove();
    addBubble("Hubo un error de conexion. Revisa tu internet e intentá de nuevo.", "assistant");
  }
  document.getElementById("send-btn").disabled = false;
}

function showSummary() {
  if (allResponses.length === 0) { alert("No hay respuestas todavia."); return; }
  const win = window.open("", "_blank");
  win.document.write(`<pre style="font-family:sans-serif;padding:2rem;max-width:800px;margin:auto;white-space:pre-wrap">RESPUESTAS — PINTO\n\n${allResponses.map((r,i)=>`${i+1}. ${r}`).join("\n")}\n\nTotal: ${allResponses.length}</pre>`);
}

function resetChat() {
  conversationHistory = [];
  turnCount = 0;
  sessionId = Date.now().toString(36);
  vecinos++;
  localStorage.setItem("vecinos", vecinos);
  document.getElementById("contador").textContent = `${vecinos} vecinos participaron hoy`;
  document.getElementById("chat-box").innerHTML = "";
  startChat();
}

async function startChat() {
  conversationHistory = [{ role: "user", content: "Hola, quiero hablar sobre los problemas de Pinto" }];
  addTyping();
  try {
    const greeting = await callAI(conversationHistory);
    document.getElementById("typing")?.remove();
    addBubble(greeting, "assistant");
    conversationHistory.push({ role: "assistant", content: greeting });
    guardarEnSheets("bot", greeting);
  } catch(e) {
    document.getElementById("typing")?.remove();
    addBubble("Hola! Gracias por participar. ¿Sos del pueblo de Pinto o de zona rural?", "assistant");
  }
}

document.getElementById("user-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

startChat();
</script>
</body>
</html>
